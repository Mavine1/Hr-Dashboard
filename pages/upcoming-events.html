<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Events Console Pro | Premium Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --gray-light: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.95);
            --glass-dark: rgba(30, 41, 59, 0.95);
            --shadow: 0 4px 10px rgba(0,0,0,0.05);
            --shadow-lg: 0 8px 20px rgba(0,0,0,0.1);
            --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: var(--dark);
            font-size: 13px;
            overflow-x: hidden;
            padding-top: 70px;
        }

        /* Fixed Header */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, var(--dark) 0%, #0f172a 100%);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 12px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        /* Hamburger Dropdown */
        .hamburger-menu {
            position: relative;
        }
        .hamburger-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .hamburger-btn span {
            width: 20px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }
        .hamburger-dropdown {
            position: absolute;
            top: 50px;
            left: 0;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: 0.2s;
            z-index: 1001;
            overflow: hidden;
        }
        .hamburger-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--dark);
            font-weight: 500;
            transition: 0.2s;
            border-bottom: 1px solid var(--gray-light);
        }
        .dropdown-item:last-child {
            border-bottom: none;
        }
        .dropdown-item:hover {
            background: var(--light);
        }
        .dropdown-item i {
            width: 20px;
            color: var(--primary);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header-left h1 {
            color: white;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-subtitle {
            color: var(--primary-light);
            font-size: 10px;
            font-weight: 500;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-bar {
            position: relative;
        }
        .search-bar input {
            padding: 8px 12px 8px 32px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 12px;
            color: white;
            width: 200px;
        }
        .search-bar i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
        .notification-bell {
            position: relative;
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
        }
        .bell-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--danger);
            color: white;
            font-size: 9px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
        }
        .btn-gradient {
            background: var(--gradient);
            color: white;
            box-shadow: 0 2px 8px rgba(99,102,241,0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--gray-light);
            color: var(--dark);
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 11px;
        }
        .main-content {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        /* Stats Cards */
        .enhanced-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
        }
        .stat-info h3 {
            font-size: 10px;
            color: var(--gray);
            margin-bottom: 2px;
            font-weight: 600;
        }
        .stat-info h2 {
            font-size: 20px;
            font-weight: 800;
            color: var(--dark);
        }
        .event-cost {
            background: var(--success);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }
        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .glass-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow);
        }
        .quick-action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }
        .quick-action {
            background: var(--light);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .quick-action:hover {
            background: var(--gradient);
            color: white;
        }
        .quick-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            color: white;
            font-size: 14px;
        }
        .quick-action h4 {
            font-size: 12px;
            font-weight: 600;
        }
        /* View Switcher */
        .view-switcher {
            background: white;
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .switcher-tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .switcher-tab {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--gray);
        }
        .switcher-tab.active {
            background: var(--gradient);
            color: white;
        }
        /* Calendar Container - Reduced Size & Modern */
        .calendar-container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .calendar-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }
        .calendar-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .date-navigator {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--light);
            padding: 5px 10px;
            border-radius: 8px;
        }
        .date-navigator select {
            border: none;
            background: transparent;
            font-size: 12px;
            font-weight: 500;
        }
        #calendarView {
            height: 380px;
            font-size: 11px;
        }
        .fc .fc-toolbar-title {
            font-size: 14px !important;
        }
        .fc .fc-button {
            padding: 4px 8px !important;
            font-size: 11px !important;
        }
        .fc .fc-daygrid-day-number {
            font-size: 11px;
        }
        .fc .fc-daygrid-event {
            font-size: 10px;
            padding: 2px 4px !important;
        }
        /* Alternative Views */
        .events-list-view, .timeline-view, .grid-view {
            display: none;
            max-height: 380px;
            overflow-y: auto;
        }
        .events-list-view.active, .timeline-view.active, .grid-view.active {
            display: block;
        }
        .event-list-item, .timeline-content, .event-grid-card {
            background: var(--light);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .event-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .event-date-badge {
            background: var(--gradient);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .event-list-info {
            flex: 1;
        }
        .event-list-title {
            font-weight: 700;
            font-size: 13px;
        }
        .event-list-meta {
            font-size: 11px;
            color: var(--gray);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .event-list-cost {
            background: var(--success);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
        }
        .timeline-item {
            position: relative;
            padding-left: 24px;
            margin-bottom: 12px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }
        .event-grid-card {
            text-align: center;
        }
        .event-grid-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }
        .modal-header {
            padding: 16px 20px;
            background: var(--gradient);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            padding: 20px;
        }
        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--gray-light);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 12px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--gray-light);
            border-radius: 8px;
            font-size: 12px;
        }
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1200;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: white;
            padding: 12px 16px;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(100%);
            opacity: 0;
            transition: 0.3s;
            border-left: 3px solid;
        }
        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }
        @media (max-width: 768px) {
            .header-left h1 { font-size: 16px; }
            .search-bar input { width: 140px; }
            .enhanced-stats { grid-template-columns: 1fr 1fr; }
            .quick-action-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .fixed-header { padding: 10px 15px; height: auto; flex-direction: column; gap: 10px; }
            body { padding-top: 100px; }
            .header-right { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <header class="fixed-header">
        <div class="header-left">
            <!-- Hamburger Dropdown -->
            <div class="hamburger-menu">
                <div class="hamburger-btn" id="hamburgerBtn">
                    <span></span><span></span><span></span>
                </div>
                <div class="hamburger-dropdown" id="hamburgerDropdown">
                    <a href="dashboard.html" class="dropdown-item"><i class="fas fa-home"></i> Home Dashboard</a>
                </div>
            </div>
            <h1><i class="fas fa-calendar-star"></i> Events Console Pro</h1>
            <div class="logo-subtitle">PREMIUM</div>
        </div>
        <div class="header-right">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="globalSearch" placeholder="Search events...">
            </div>
            <button class="notification-bell" onclick="showNotificationModal()">
                <i class="fas fa-bell"></i>
                <span class="bell-badge" id="bellBadge">0</span>
            </button>
            <button class="btn btn-gradient btn-sm" onclick="openEventModal()">
                <i class="fas fa-plus"></i> New Event
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="toast-container" id="toastContainer"></div>

        <!-- Action Buttons -->
        <div class="action-buttons" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <button class="btn btn-gradient" onclick="openEventModal()"><i class="fas fa-plus-circle"></i> Create Event</button>
            <button class="btn btn-outline" onclick="openQuickReminderModal()"><i class="fas fa-bell"></i> Set Reminder</button>
            <button class="btn btn-outline" onclick="exportEvents()"><i class="fas fa-download"></i> Export</button>
            <button class="btn btn-outline" onclick="openCostReportsModal()"><i class="fas fa-chart-line"></i> Cost Reports</button>
            <button class="btn btn-outline" onclick="goToToday()"><i class="fas fa-calendar-day"></i> Today</button>
        </div>

        <!-- Stats Cards -->
        <div class="enhanced-stats">
            <div class="stat-card" onclick="filterEvents('all')">
                <div class="stat-icon" style="background: var(--gradient);"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-info"><h3>Total Events</h3><h2 id="totalEvents">0</h2></div>
                <div class="event-cost">Ksh <span id="totalCost">0</span></div>
            </div>
            <div class="stat-card" onclick="filterEvents('meeting')">
                <div class="stat-icon" style="background: #10b981;"><i class="fas fa-users"></i></div>
                <div class="stat-info"><h3>Meetings</h3><h2 id="meetingCount">0</h2></div>
            </div>
            <div class="stat-card" onclick="filterEvents('training')">
                <div class="stat-icon" style="background: #f59e0b;"><i class="fas fa-graduation-cap"></i></div>
                <div class="stat-info"><h3>Trainings</h3><h2 id="trainingCount">0</h2></div>
            </div>
            <div class="stat-card" onclick="showTodayEvents()">
                <div class="stat-icon" style="background: #ef4444;"><i class="fas fa-clock"></i></div>
                <div class="stat-info"><h3>Today's Events</h3><h2 id="todayEvents">0</h2></div>
            </div>
        </div>

        <!-- Quick Actions & Chart -->
        <div class="content-grid">
            <div class="glass-card">
                <h3><i class="fas fa-chart-pie"></i> Cost Distribution</h3>
                <canvas id="costChart" height="160" style="max-height: 160px;"></canvas>
            </div>
            <div class="glass-card">
                <h3><i class="fas fa-bolt"></i> Quick Actions</h3>
                <div class="quick-action-grid">
                    <div class="quick-action" onclick="quickCreate('meeting')"><div class="quick-icon"><i class="fas fa-users"></i></div><h4>Quick Meeting</h4></div>
                    <div class="quick-action" onclick="quickCreate('training')"><div class="quick-icon"><i class="fas fa-graduation-cap"></i></div><h4>Training</h4></div>
                    <div class="quick-action" onclick="quickCreate('conference')"><div class="quick-icon"><i class="fas fa-conference"></i></div><h4>Conference</h4></div>
                    <div class="quick-action" onclick="addReminder()"><div class="quick-icon"><i class="fas fa-bell"></i></div><h4>Reminder</h4></div>
                </div>
            </div>
        </div>

        <!-- View Switcher -->
        <div class="view-switcher">
            <div class="switcher-tabs">
                <button class="switcher-tab active" onclick="setView('calendar')"><i class="fas fa-calendar-alt"></i> Calendar</button>
                <button class="switcher-tab" onclick="setView('list')"><i class="fas fa-list"></i> List</button>
                <button class="switcher-tab" onclick="setView('timeline')"><i class="fas fa-stream"></i> Timeline</button>
                <button class="switcher-tab" onclick="setView('grid')"><i class="fas fa-th-large"></i> Grid</button>
            </div>
        </div>

        <!-- Calendar Container -->
        <div class="calendar-container">
            <div class="calendar-header">
                <div class="calendar-controls">
                    <div class="date-navigator">
                        <button class="btn btn-sm" onclick="prevPeriod()"><i class="fas fa-chevron-left"></i></button>
                        <select id="monthSelect"></select>
                        <select id="yearSelect"></select>
                        <button class="btn btn-sm" onclick="nextPeriod()"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div>
                        <button class="btn btn-sm calendar-view-btn active" onclick="setCalendarView('dayGridMonth')">Month</button>
                        <button class="btn btn-sm calendar-view-btn" onclick="setCalendarView('timeGridWeek')">Week</button>
                        <button class="btn btn-sm calendar-view-btn" onclick="setCalendarView('timeGridDay')">Day</button>
                    </div>
                </div>
            </div>
            <div id="calendarView" style="height: 380px;"></div>
            <div class="events-list-view" id="listView"></div>
            <div class="timeline-view" id="timelineView"></div>
            <div class="grid-view" id="gridView"></div>
        </div>
    </main>

    <!-- Modals (Event, Reminder, Notifications, Cost Reports, Event Detail) -->
    <div id="eventModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-calendar-plus"></i> Create Event</h3><button class="close-modal" onclick="closeModal('eventModal')">&times;</button></div><div class="modal-body"><form id="eventForm"><div class="form-group"><label>Title *</label><input type="text" id="eventTitle" class="form-input" required></div><div class="form-group"><label>Type *</label><select id="eventType" class="form-select"><option value="meeting">Meeting</option><option value="training">Training</option><option value="conference">Conference</option><option value="workshop">Workshop</option></select></div><div class="form-group"><label>Cost (Ksh)</label><input type="number" id="eventCost" class="form-input" value="0"></div><div class="form-group"><label>Start *</label><input type="datetime-local" id="eventStart" class="form-input" required></div><div class="form-group"><label>End *</label><input type="datetime-local" id="eventEnd" class="form-input" required></div><div class="form-group"><label>Location</label><input type="text" id="eventLocation" class="form-input"></div><div class="form-group"><label>Description</label><textarea id="eventDesc" class="form-textarea" rows="2"></textarea></div></form></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('eventModal')">Cancel</button><button class="btn btn-gradient" onclick="saveEvent()">Save Event</button></div></div></div>

    <div id="reminderModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-bell"></i> Set Reminder</h3><button class="close-modal" onclick="closeModal('reminderModal')">&times;</button></div><div class="modal-body"><div class="form-group"><label>Title</label><input type="text" id="reminderTitle" class="form-input"></div><div class="form-group"><label>Date & Time</label><input type="datetime-local" id="reminderTime" class="form-input"></div><div class="form-group"><label>Priority</label><select id="reminderPriority"><option>Low</option><option>Medium</option><option>High</option></select></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('reminderModal')">Cancel</button><button class="btn btn-gradient" onclick="saveReminder()">Set</button></div></div></div>

    <div id="notificationModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-bell"></i> Notifications</h3><button class="close-modal" onclick="closeModal('notificationModal')">&times;</button></div><div class="modal-body" id="notificationList"></div><div class="modal-footer"><button class="btn btn-outline" onclick="clearNotifications()">Clear All</button><button class="btn btn-gradient" onclick="markAllAsRead()">Mark Read</button></div></div></div>

    <div id="eventDetailModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-info-circle"></i> Event Details</h3><button class="close-modal" onclick="closeModal('eventDetailModal')">&times;</button></div><div class="modal-body" id="eventDetailBody"></div><div class="modal-footer"><button class="btn btn-danger" id="deleteEventBtn" onclick="deleteCurrentEvent()">Delete Event</button><button class="btn btn-outline" onclick="closeModal('eventDetailModal')">Close</button></div></div></div>

    <div id="costReportsModal" class="modal"><div class="modal-content" style="max-width: 700px;"><div class="modal-header"><h3><i class="fas fa-chart-line"></i> Cost Reports</h3><button class="close-modal" onclick="closeModal('costReportsModal')">&times;</button></div><div class="modal-body"><div class="form-row" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;"><select id="reportTypeFilter" class="form-select" style="flex:1"><option value="all">All Types</option><option value="meeting">Meeting</option><option value="training">Training</option><option value="conference">Conference</option><option value="workshop">Workshop</option></select><input type="date" id="reportStart" class="form-input" placeholder="Start Date"><input type="date" id="reportEnd" class="form-input" placeholder="End Date"><button class="btn btn-gradient btn-sm" onclick="refreshCostReport()">Apply Filter</button></div><canvas id="reportChart" height="200" style="max-height: 200px;"></canvas><div class="report-stats" style="margin-top: 15px; display: flex; gap: 15px; justify-content: space-between;"><div><strong>Total Cost:</strong> <span id="reportTotalCost">0</span> Ksh</div><div><strong>Events:</strong> <span id="reportEventCount">0</span></div></div><div class="report-actions" style="margin-top: 15px; display: flex; gap: 10px;"><button class="btn btn-outline btn-sm" onclick="exportReportCSV()"><i class="fas fa-file-csv"></i> CSV</button><button class="btn btn-outline btn-sm" onclick="exportReportJSON()"><i class="fas fa-code"></i> JSON</button></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('costReportsModal')">Close</button></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script>
        // App State
        let events = [];
        let notifications = [];
        let calendar = null;
        let currentView = 'calendar';
        let currentCalendarView = 'dayGridMonth';
        let currentEventIdToDelete = null;
        let costChart = null;

        // Load from localStorage
        function loadData() {
            const storedEvents = localStorage.getItem('eventsPro_events');
            if (storedEvents) events = JSON.parse(storedEvents);
            else {
                // sample data
                const today = new Date();
                events = [
                    { id: 1, title: "Quarterly Planning", type: "meeting", cost: 0, start: new Date(today.setHours(10,0)).toISOString(), end: new Date(today.setHours(12,0)).toISOString(), location: "Board Room", description: "" },
                    { id: 2, title: "Leadership Training", type: "training", cost: 50000, start: new Date(Date.now() + 86400000).toISOString(), end: new Date(Date.now() + 86400000 + 3600000*8).toISOString(), location: "Training Center", description: "" },
                    { id: 3, title: "Tech Conference", type: "conference", cost: 250000, start: new Date(Date.now() + 86400000*5).toISOString(), end: new Date(Date.now() + 86400000*5 + 3600000*10).toISOString(), location: "Convention Center", description: "" }
                ];
                saveEvents();
            }
            const storedNotifs = localStorage.getItem('eventsPro_notifications');
            if (storedNotifs) notifications = JSON.parse(storedNotifs);
            else notifications = [];
            updateNotificationBadge();
            renderAll();
        }
        function saveEvents() { localStorage.setItem('eventsPro_events', JSON.stringify(events)); }
        function saveNotifications() { localStorage.setItem('eventsPro_notifications', JSON.stringify(notifications)); }

        function renderAll() {
            updateStats();
            updateCalendar();
            updateAlternativeViews();
            updateCostChart();
        }
        function updateStats() {
            const total = events.length;
            const totalCost = events.reduce((sum, e) => sum + (e.cost || 0), 0);
            const meetingCount = events.filter(e => e.type === 'meeting').length;
            const trainingCount = events.filter(e => e.type === 'training').length;
            const today = new Date().toDateString();
            const todayEvents = events.filter(e => new Date(e.start).toDateString() === today).length;
            document.getElementById('totalEvents').innerText = total;
            document.getElementById('totalCost').innerText = totalCost.toLocaleString();
            document.getElementById('meetingCount').innerText = meetingCount;
            document.getElementById('trainingCount').innerText = trainingCount;
            document.getElementById('todayEvents').innerText = todayEvents;
        }
        function updateCalendar() {
            if (!calendar) return;
            calendar.removeAllEvents();
            events.forEach(e => {
                calendar.addEvent({
                    id: e.id,
                    title: `${e.title} (Ksh ${(e.cost || 0).toLocaleString()})`,
                    start: e.start,
                    end: e.end,
                    backgroundColor: getEventColor(e.type),
                    extendedProps: { ...e }
                });
            });
        }
        function updateAlternativeViews() {
            // List view
            const listView = document.getElementById('listView');
            listView.innerHTML = events.sort((a,b)=>new Date(a.start)-new Date(b.start)).map(e => {
                const d = new Date(e.start);
                return `<div class="event-list-item" onclick="viewEventDetails(${e.id})">
                    <div class="event-date-badge"><div>${d.getDate()}</div><div style="font-size:9px">${d.toLocaleString('default',{month:'short'})}</div></div>
                    <div class="event-list-info"><div class="event-list-title">${e.title}</div><div class="event-list-meta"><span><i class="fas fa-clock"></i> ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span><span><i class="fas fa-map-marker-alt"></i> ${e.location||'TBD'}</span></div></div>
                    <div class="event-list-cost">Ksh ${(e.cost||0).toLocaleString()}</div>
                </div>`;
            }).join('');
            // Timeline
            const timeline = document.getElementById('timelineView');
            timeline.innerHTML = events.slice(0,8).map(e => `<div class="timeline-item" onclick="viewEventDetails(${e.id})"><div class="timeline-content"><strong>${e.title}</strong> - ${new Date(e.start).toLocaleString()}<br><span class="event-list-cost">Ksh ${(e.cost||0).toLocaleString()}</span></div></div>`).join('');
            // Grid
            const grid = document.getElementById('gridView');
            grid.innerHTML = events.map(e => `<div class="event-grid-card" onclick="viewEventDetails(${e.id})"><div class="event-grid-type" style="background:${getEventColor(e.type)}">${e.type}</div><div class="event-grid-title">${e.title}</div><div class="event-grid-time"><i class="fas fa-calendar"></i> ${new Date(e.start).toLocaleDateString()}</div><div class="event-grid-cost">Ksh ${(e.cost||0).toLocaleString()}</div></div>`).join('');
        }
        function updateCostChart() {
            const ctx = document.getElementById('costChart').getContext('2d');
            const types = ['meeting','training','conference','workshop'];
            const costs = types.map(t => events.filter(e=>e.type===t).reduce((s,e)=>s+(e.cost||0),0));
            if (window.costChart) window.costChart.destroy();
            window.costChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Meetings','Trainings','Conferences','Workshops'], datasets: [{ data: costs, backgroundColor: ['#6366f1','#10b981','#8b5cf6','#f59e0b'] }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } } });
        }
        function getEventColor(type) {
            const colors = { meeting: '#6366f1', training: '#10b981', conference: '#8b5cf6', workshop: '#f59e0b' };
            return colors[type] || '#6366f1';
        }
        // Event CRUD
        function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            if (!title) { showToast('Title required','warning'); return; }
            const newEvent = {
                id: Date.now(),
                title,
                type: document.getElementById('eventType').value,
                cost: parseInt(document.getElementById('eventCost').value) || 0,
                start: document.getElementById('eventStart').value,
                end: document.getElementById('eventEnd').value,
                location: document.getElementById('eventLocation').value,
                description: document.getElementById('eventDesc').value
            };
            events.push(newEvent);
            saveEvents();
            renderAll();
            closeModal('eventModal');
            showToast('Event created','success');
            addNotification(`New event: ${title}`, 'info');
        }
        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            saveEvents();
            renderAll();
            showToast('Event deleted','info');
            addNotification('Event removed','warning');
        }
        function viewEventDetails(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;
            currentEventIdToDelete = id;
            document.getElementById('eventDetailBody').innerHTML = `
                <h4>${event.title}</h4>
                <p><strong>Type:</strong> ${event.type}</p>
                <p><strong>Cost:</strong> Ksh ${(event.cost||0).toLocaleString()}</p>
                <p><strong>Start:</strong> ${new Date(event.start).toLocaleString()}</p>
                <p><strong>End:</strong> ${new Date(event.end).toLocaleString()}</p>
                <p><strong>Location:</strong> ${event.location || 'Not specified'}</p>
                <p><strong>Description:</strong> ${event.description || 'No description'}</p>
            `;
            showModal('eventDetailModal');
        }
        function deleteCurrentEvent() {
            if (currentEventIdToDelete) {
                deleteEvent(currentEventIdToDelete);
                closeModal('eventDetailModal');
            }
        }
        // Notifications
        function addNotification(msg, type='info') {
            notifications.unshift({ id: Date.now(), message: msg, type, read: false, timestamp: new Date() });
            saveNotifications();
            updateNotificationBadge();
            animateBell();
        }
        function updateNotificationBadge() {
            const unread = notifications.filter(n=>!n.read).length;
            document.getElementById('bellBadge').innerText = unread;
            document.getElementById('bellBadge').style.display = unread ? 'flex' : 'none';
        }
        function showNotificationModal() {
            const listDiv = document.getElementById('notificationList');
            listDiv.innerHTML = notifications.map(n => `<div style="padding:10px; border-bottom:1px solid #eee; background:${n.read?'#f8fafc':'white'}" onclick="markRead(${n.id})"><i class="fas fa-${n.type==='success'?'check-circle':'info-circle'}"></i> ${n.message}<br><small>${new Date(n.timestamp).toLocaleString()}</small></div>`).join('');
            showModal('notificationModal');
        }
        function markRead(id) {
            const n = notifications.find(n=>n.id===id);
            if(n) n.read=true;
            saveNotifications();
            updateNotificationBadge();
            showNotificationModal();
        }
        function markAllAsRead() {
            notifications.forEach(n=>n.read=true);
            saveNotifications();
            updateNotificationBadge();
            closeModal('notificationModal');
        }
        function clearNotifications() {
            notifications = [];
            saveNotifications();
            updateNotificationBadge();
            closeModal('notificationModal');
            showToast('Notifications cleared','info');
        }
        // Reminder
        function saveReminder() {
            const title = document.getElementById('reminderTitle').value || 'Reminder';
            const time = document.getElementById('reminderTime').value;
            addNotification(`Reminder: ${title} at ${new Date(time).toLocaleString()}`, 'warning');
            closeModal('reminderModal');
            showToast('Reminder set','success');
        }
        // Cost Reports
        function openCostReportsModal() {
            showModal('costReportsModal');
            refreshCostReport();
        }
        function refreshCostReport() {
            const typeFilter = document.getElementById('reportTypeFilter').value;
            const startDate = document.getElementById('reportStart').value;
            const endDate = document.getElementById('reportEnd').value;
            let filtered = events;
            if (typeFilter !== 'all') filtered = filtered.filter(e => e.type === typeFilter);
            if (startDate) filtered = filtered.filter(e => new Date(e.start) >= new Date(startDate));
            if (endDate) filtered = filtered.filter(e => new Date(e.start) <= new Date(endDate));
            const totalCost = filtered.reduce((s,e)=>s+(e.cost||0),0);
            document.getElementById('reportTotalCost').innerText = totalCost.toLocaleString();
            document.getElementById('reportEventCount').innerText = filtered.length;
            // Chart by type within filtered
            const types = ['meeting','training','conference','workshop'];
            const costsByType = types.map(t => filtered.filter(e=>e.type===t).reduce((s,e)=>s+(e.cost||0),0));
            const ctx = document.getElementById('reportChart').getContext('2d');
            if (window.reportChart) window.reportChart.destroy();
            window.reportChart = new Chart(ctx, { type: 'bar', data: { labels: ['Meetings','Trainings','Conferences','Workshops'], datasets: [{ label: 'Cost (Ksh)', data: costsByType, backgroundColor: '#6366f1' }] }, options: { responsive: true, maintainAspectRatio: true } });
        }
        function exportReportCSV() {
            let filtered = events;
            const typeFilter = document.getElementById('reportTypeFilter').value;
            const startDate = document.getElementById('reportStart').value;
            const endDate = document.getElementById('reportEnd').value;
            if (typeFilter !== 'all') filtered = filtered.filter(e => e.type === typeFilter);
            if (startDate) filtered = filtered.filter(e => new Date(e.start) >= new Date(startDate));
            if (endDate) filtered = filtered.filter(e => new Date(e.start) <= new Date(endDate));
            const rows = [['Title','Type','Cost','Start','Location']];
            filtered.forEach(e => rows.push([e.title, e.type, e.cost, e.start, e.location]));
            const csv = rows.map(r=>r.join(',')).join('\n');
            downloadFile('cost_report.csv', csv, 'text/csv');
        }
        function exportReportJSON() {
            let filtered = events;
            const typeFilter = document.getElementById('reportTypeFilter').value;
            const startDate = document.getElementById('reportStart').value;
            const endDate = document.getElementById('reportEnd').value;
            if (typeFilter !== 'all') filtered = filtered.filter(e => e.type === typeFilter);
            if (startDate) filtered = filtered.filter(e => new Date(e.start) >= new Date(startDate));
            if (endDate) filtered = filtered.filter(e => new Date(e.start) <= new Date(endDate));
            downloadFile('cost_report.json', JSON.stringify(filtered, null, 2), 'application/json');
        }
        function downloadFile(filename, content, type) {
            const a = document.createElement('a');
            const blob = new Blob([content], { type });
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('Report downloaded','success');
        }
        // UI Helpers
        function showModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function showToast(msg, type='info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='warning'?'exclamation-triangle':'info-circle'}"></i><span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(()=>toast.classList.add('show'),10);
            setTimeout(()=>{ toast.classList.remove('show'); setTimeout(()=>toast.remove(),300); },3000);
        }
        function animateBell() { const bell = document.querySelector('.notification-bell'); bell.style.animation='none'; setTimeout(()=>bell.style.animation='bellRing 0.5s ease',10); }
        function openEventModal(date=null) {
            const now = new Date();
            const start = date ? new Date(date) : new Date();
            document.getElementById('eventStart').value = start.toISOString().slice(0,16);
            document.getElementById('eventEnd').value = new Date(start.getTime()+3600000).toISOString().slice(0,16);
            showModal('eventModal');
        }
        function openQuickReminderModal() { showModal('reminderModal'); }
        function exportEvents() { downloadFile('events_backup.json', JSON.stringify(events,null,2), 'application/json'); showToast('Events exported','success'); }
        function goToToday() { if(calendar) calendar.today(); }
        function filterEvents(type) { if(type==='all') renderAll(); else { const filtered = events.filter(e=>e.type===type); updateCalendarWithFilter(filtered); updateAlternativeViewsWithFilter(filtered); } }
        function updateCalendarWithFilter(filtered) { if(calendar) { calendar.removeAllEvents(); filtered.forEach(e=>calendar.addEvent({id:e.id,title:e.title,start:e.start,end:e.end,backgroundColor:getEventColor(e.type)})); } }
        function updateAlternativeViewsWithFilter(filtered) { /* quick update */ updateAlternativeViews(); }
        function showTodayEvents() { const today = new Date().toDateString(); const todayEvents = events.filter(e=>new Date(e.start).toDateString()===today); if(todayEvents.length) showToast(`${todayEvents.length} events today`,'info'); else showToast('No events today','info'); }
        function quickCreate(type) { const newEvent = { id:Date.now(), title:`Quick ${type}`, type, cost:Math.floor(Math.random()*50000), start:new Date().toISOString(), end:new Date(Date.now()+3600000).toISOString(), location:'TBD', description:'' }; events.push(newEvent); saveEvents(); renderAll(); showToast(`Quick ${type} added`,'success'); }
        function addReminder() { openQuickReminderModal(); }
        function setView(view) {
            currentView = view;
            document.querySelectorAll('.switcher-tab').forEach(t=>t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('calendarView').style.display = view==='calendar'?'block':'none';
            document.getElementById('listView').classList.toggle('active', view==='list');
            document.getElementById('timelineView').classList.toggle('active', view==='timeline');
            document.getElementById('gridView').classList.toggle('active', view==='grid');
            if(view==='list') updateAlternativeViews();
            if(view==='timeline') updateAlternativeViews();
            if(view==='grid') updateAlternativeViews();
        }
        function setCalendarView(view) { if(calendar) calendar.changeView(view); }
        function prevPeriod() { if(calendar) calendar.prev(); }
        function nextPeriod() { if(calendar) calendar.next(); }
        // Hamburger
        document.getElementById('hamburgerBtn').addEventListener('click',()=>{
            document.getElementById('hamburgerDropdown').classList.toggle('active');
        });
        document.addEventListener('click',(e)=>{ if(!e.target.closest('.hamburger-menu')) document.getElementById('hamburgerDropdown').classList.remove('active'); });
        // Initialize Calendar
        document.addEventListener('DOMContentLoaded',()=>{
            const calendarEl = document.getElementById('calendarView');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth', height: 'auto', headerToolbar: false,
                events: [], eventClick: (info) => viewEventDetails(parseInt(info.event.id)),
                dateClick: (info) => openEventModal(info.dateStr)
            });
            calendar.render();
            // populate month/year selects
            const monthSelect = document.getElementById('monthSelect');
            const yearSelect = document.getElementById('yearSelect');
            for(let i=0;i<12;i++) monthSelect.innerHTML += `<option value="${i}">${new Date(0,i).toLocaleString('default',{month:'long'})}</option>`;
            for(let i=2023;i<=2026;i++) yearSelect.innerHTML += `<option value="${i}">${i}</option>`;
            const now = new Date();
            monthSelect.value = now.getMonth();
            yearSelect.value = now.getFullYear();
            monthSelect.addEventListener('change',()=>{ if(calendar) calendar.gotoDate(new Date(yearSelect.value, monthSelect.value, 1)); });
            yearSelect.addEventListener('change',()=>{ if(calendar) calendar.gotoDate(new Date(yearSelect.value, monthSelect.value, 1)); });
            loadData();
        });
    </script>
</body>
</html>
