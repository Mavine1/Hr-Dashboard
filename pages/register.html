<!-- pages/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Access - HR & Admin System</title>
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            overflow-y: auto;
        }

        .register-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            margin: auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo p {
            color: #666;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
            font-size: 13px;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 11px 11px 11px 38px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .name-fields {
            display: flex;
            gap: 10px;
        }

        .name-fields .form-group {
            flex: 1;
        }

        .role-selection {
            margin: 15px 0;
        }

        .role-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .role-option input {
            display: none;
        }

        .role-option label {
            display: block;
            padding: 9px 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .role-option input:checked + label {
            border-color: #667eea;
            background: #f0f5ff;
            color: #667eea;
            font-weight: 500;
        }

        .terms {
            margin: 12px 0;
            display: flex;
            align-items: flex-start;
        }

        .terms input {
            margin-top: 3px;
            margin-right: 8px;
            cursor: pointer;
        }

        .terms label {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 13px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 70px;
            font-size: 13px;
            padding: 10px;
        }

        select.form-control {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 20px 15px;
                max-width: 350px;
            }
            
            .name-fields {
                flex-direction: column;
                gap: 0;
            }
            
            .role-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h2><i class="fas fa-briefcase"></i> HR-Admin Box</h2>
            <p>Request System Access</p>
        </div>

        <form id="registerForm">
            <div class="name-fields">
                <div class="form-group">
                    <label>First Name</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" placeholder="John" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Work Email</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-control" placeholder="john@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Department</label>
                <div class="input-with-icon">
                    <i class="fas fa-building"></i>
                    <select class="form-control" required>
                        <option value="">Select Department</option>
                        <option value="hr">Human Resources</option>
                        <option value="admin">Administration</option>
                        <option value="it">IT Department</option>
                        <option value="finance">Finance</option>
                    </select>
                </div>
            </div>

            <div class="role-selection">
                <label>Access Level</label>
                <div class="role-options">
                    <div class="role-option">
                        <input type="radio" name="role" value="viewer">
                        <label>Viewer</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" value="editor" checked>
                        <label>Editor</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" value="admin">
                        <label>Admin</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Reason for Access (Optional)</label>
                <textarea class="form-control" rows="2" placeholder="Briefly explain why you need access..."></textarea>
            </div>

            <div class="terms">
                <input type="checkbox" required>
                <label>I agree to Terms and Privacy Policy</label>
            </div>
            
            <div class="terms">
                <input type="checkbox" required>
                <label>I agree to maintain confidentiality</label>
            </div>

            <button type="submit" class="btn-primary">
                Submit Request
            </button>
        </form>

        <div class="login-link">
            <p>Already have an account? <a href="login.html">Sign in here</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Access request submitted! The HR team will review your request.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
