<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Letters | HR Admin Pro - Smart Letter Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #1e40af;
            --secondary-blue: #3b82f6;
            --light-blue: #dbeafe;
            --sky-blue: #eff6ff;
            --dark-blue: #1e3a8a;
            --primary-red: #b91c1c;
            --light-red: #fee2e2;
            --soft-red: #fef2f2;
            --pure-white: #ffffff;
            --off-white: #f8fafc;
            --light-gray: #e2e8f0;
            --medium-gray: #94a3b8;
            --dark-gray: #334155;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--off-white);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Header, Sidebar, Modal styles (condensed for brevity - same elegant design) */
        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--pure-white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }
        .logo-icon { width: 40px; height: 40px; background: var(--primary-blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { color: white; }
        .animated-title-container { position: absolute; left: 50%; transform: translateX(-50%); background: var(--light-blue); padding: 0.4rem 1.5rem; border-radius: 40px; border: 1px solid var(--primary-blue); }
        .animated-title { font-size: 0.9rem; font-weight: 500; color: var(--primary-blue); white-space: nowrap; animation: slideText 20s linear infinite; }
        @keyframes slideText { 0% { transform: translateX(100%); opacity: 0; } 5% { transform: translateX(0); opacity: 1; } 95% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(-100%); opacity: 0; } }
        .hamburger-btn { width: 40px; height: 40px; background: var(--off-white); border: 1px solid var(--border-color); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
        .logout-btn { background: var(--primary-blue); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 10px; cursor: pointer; }
        .sidebar { position: fixed; top: 70px; left: -280px; width: 280px; height: calc(100vh - 70px); background: white; transition: left 0.3s; z-index: 999; }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); background: rgba(0,0,0,0.5); z-index: 998; }
        .overlay.active { display: block; }
        .main-content { margin-top: 90px; padding: 2rem; transition: margin-left 0.3s; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; border-radius: 16px; padding: 1.5rem 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 16px; padding: 1.5rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow-sm); }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--primary-blue); border:1px solid var(--primary-blue);}
        .stat-icon { width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; }
        .stat-icon.blue { background: var(--primary-blue); }
        .stat-icon.green { background: #10b981; }
        .stat-icon.yellow { background: #f59e0b; }
        .stat-icon.red { background: var(--primary-red); }
        .content-card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: var(--shadow-sm); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .btn { padding: 0.7rem 1.5rem; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary-blue); color: white; }
        .btn-secondary { background: var(--pure-white); color: var(--primary-blue); border: 1px solid var(--primary-blue); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 1rem; background: var(--light-blue); color: var(--primary-blue); }
        .data-table td { padding: 1rem; border-bottom: 1px solid var(--border-color); }
        .status-badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        .status-sent { background: var(--light-blue); color: var(--primary-blue); }
        .status-draft { background: #fff3cd; color: #856404; }
        .status-pending { background: var(--light-red); color: var(--primary-red); }
        .categories-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }
        .category-item { background: var(--off-white); border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; border: 1px solid var(--border-color); transition: 0.2s; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 1.5rem 2rem; background: var(--light-blue); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .form-group { margin-bottom: 1.5rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-control { width: 100%; padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--off-white); }
        .toast { position: fixed; top: 100px; right: 20px; padding: 1rem 1.5rem; border-radius: 10px; background: white; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 1rem; z-index: 3000; border-left: 4px solid; animation: slideIn 0.3s ease; }
        .toast.success { border-left-color: #10b981; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .stats-grid, .categories-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
        .search-box { display: flex; align-items: center; gap: 0.5rem; background: var(--off-white); border: 1px solid var(--border-color); border-radius: 10px; padding: 0.5rem 1rem; }
        .table-actions { display: flex; gap: 0.5rem; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo"><div class="logo-icon"><i class="fas fa-briefcase"></i></div><h2>HR-Admin Pro</h2></div>
        <div class="animated-title-container"><div class="animated-title">HR Letters Management | Templates | Employee Communications</div></div>
        <div style="display: flex; gap: 1rem;">
            <div class="hamburger-btn" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </header>
    <div class="sidebar" id="sidebar"><div style="padding:1.5rem; border-bottom:1px solid #e2e8f0;"><h3><i class="fas fa-briefcase"></i> Navigation</h3></div><ul class="sidebar-menu" style="list-style:none; padding:1rem;"><li><a href="#" style="display:flex; gap:1rem; padding:0.8rem; text-decoration:none; color:#334155;"><i class="fas fa-envelope"></i> HR Letters</a></li></ul></div>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <main class="main-content">
        <div class="page-header"><div><h1>HR Letters & Templates</h1><p>Create, manage & save letters with full persistent storage</p></div><div><button class="btn btn-primary" onclick="openCreateLetter()"><i class="fas fa-plus"></i> New Letter</button></div></div>
        <div class="stats-grid" id="statsContainer"></div>
        <div class="content-card"><div class="card-header"><h3><i class="fas fa-envelope-open-text"></i> All Letters</h3><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search letters..." onkeyup="renderLetters()"></div></div>
        <table class="data-table"><thead><tr><th>Ref No.</th><th>Employee</th><th>Type</th><th>Subject</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="lettersTableBody"></tbody></table></div>
        <div class="content-card"><div class="card-header"><h3><i class="fas fa-tags"></i> Quick Templates</h3></div><div class="categories-grid" id="quickTemplates"></div></div>
    </main>

    <!-- Create/Edit Letter Modal -->
    <div id="letterFormModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-file-alt"></i> Compose Letter</h3><button class="modal-close" onclick="closeModal('letterFormModal')">&times;</button></div><div class="modal-body"><form id="letterFormElement"><input type="hidden" id="editId" value=""><div class="form-row"><div class="form-group"><label>Letter Type</label><select id="letterType" class="form-control" required><option value="">Select Type</option><option value="Appointment">Appointment Letter</option><option value="Promotion">Promotion Letter</option><option value="Warning">Warning Letter</option><option value="Termination">Termination Letter</option><option value="Experience">Experience Letter</option><option value="Salary Revision">Salary Revision</option></select></div><div class="form-group"><label>Employee Name</label><input type="text" id="employeeName" class="form-control" placeholder="Full name" required></div></div><div class="form-row"><div class="form-group"><label>Letter Date</label><input type="date" id="letterDate" class="form-control" required></div><div class="form-group"><label>Reference Number</label><input type="text" id="refNumber" class="form-control" placeholder="Auto-generated" readonly></div></div><div class="form-group"><label>Subject</label><input type="text" id="letterSubject" class="form-control" required></div><div class="form-group"><label>Content</label><div style="display:flex; gap:0.5rem; margin-bottom:0.5rem;"><button type="button" class="btn btn-sm btn-outline" onclick="insertVar('{employee_name}')"><i class="fas fa-user"></i> Name</button><button type="button" class="btn btn-sm btn-outline" onclick="insertVar('{date}')"><i class="fas fa-calendar"></i> Date</button><button type="button" class="btn btn-sm btn-outline" onclick="insertVar('{position}')"><i class="fas fa-briefcase"></i> Position</button></div><textarea id="letterContent" class="form-control" rows="8" placeholder="Write letter content..." required></textarea></div></form></div><div class="modal-footer" style="padding:1.5rem; display:flex; gap:1rem; justify-content:flex-end;"><button class="btn btn-outline" onclick="closeModal('letterFormModal')">Cancel</button><button class="btn btn-secondary" onclick="saveAsDraftLetter()">Save Draft</button><button class="btn btn-primary" onclick="saveLetter(true)">Send Letter</button></div></div></div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-eye"></i> Preview & Confirm</h3><button class="modal-close" onclick="closeModal('previewModal')">&times;</button></div><div class="modal-body"><div id="previewContent" style="white-space: pre-line; line-height: 1.8;"></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('previewModal')">Edit</button><button class="btn btn-primary" id="confirmSendBtn">Confirm Send</button></div></div></div>

    <div id="toastContainer"></div>

    <script>
        // ---------- STORAGE KEYS ----------
        const STORAGE_KEY = 'hr_letters_demo';
        
        // Default demo letters with persistent structure
        let letters = [
            { id: '1', ref: 'HR/LTR/2024/001', employee: 'John Doe', type: 'Promotion', subject: 'Promotion to Senior Manager', date: '2024-12-01', status: 'sent', content: 'Congratulations John! You are promoted to Senior Manager effective immediately.' },
            { id: '2', ref: 'HR/LTR/2024/002', employee: 'Jane Smith', type: 'Appointment', subject: 'Appointment as Project Lead', date: '2024-12-03', status: 'draft', content: 'Dear Jane, We are pleased to appoint you as Project Lead...' },
            { id: '3', ref: 'HR/LTR/2024/003', employee: 'Mike Johnson', type: 'Warning', subject: 'Attendance Warning', date: '2024-12-04', status: 'pending', content: 'This is a formal warning regarding attendance...' },
            { id: '4', ref: 'HR/LTR/2024/004', employee: 'Sarah Williams', type: 'Experience', subject: 'Experience Certificate', date: '2024-11-28', status: 'sent', content: 'Certifying that Sarah worked as Marketing Lead...' },
            { id: '5', ref: 'HR/LTR/2024/005', employee: 'Robert Brown', type: 'Salary Revision', subject: 'Salary Increment', date: '2024-12-05', status: 'sent', content: 'Salary revised to $95,000 per annum.' }
        ];

        // Load from localStorage if exists
        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                letters = JSON.parse(stored);
            } else {
                saveToStorage();
            }
        }
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(letters));
        }

        // Helper: generate ref number
        function generateRef() {
            const year = new Date().getFullYear();
            const nextNum = letters.length + 1;
            return `HR/LTR/${year}/${String(nextNum).padStart(3,'0')}`;
        }

        // Render everything
        function renderLetters() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const filtered = letters.filter(l => l.employee.toLowerCase().includes(searchTerm) || l.subject.toLowerCase().includes(searchTerm) || l.ref.toLowerCase().includes(searchTerm));
            const tbody = document.getElementById('lettersTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            filtered.forEach(letter => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${letter.ref}</td>
                    <td>${letter.employee}</td>
                    <td>${letter.type}</td>
                    <td>${letter.subject}</td>
                    <td>${letter.date}</td>
                    <td><span class="status-badge status-${letter.status === 'sent' ? 'sent' : (letter.status === 'draft' ? 'draft' : 'pending')}">${letter.status}</span></td>
                    <td><div class="table-actions"><button class="btn btn-sm btn-primary" onclick="viewLetter('${letter.id}')"><i class="fas fa-eye"></i></button><button class="btn btn-sm btn-outline" onclick="editLetter('${letter.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline" onclick="deleteLetter('${letter.id}')"><i class="fas fa-trash"></i></button></div></td>
                `;
            });
            updateStats();
        }

        function updateStats() {
            const sent = letters.filter(l => l.status === 'sent').length;
            const drafts = letters.filter(l => l.status === 'draft').length;
            const pending = letters.filter(l => l.status === 'pending').length;
            const total = letters.length;
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card" onclick="filterByStatus('sent')"><div class="stat-icon blue"><i class="fas fa-envelope"></i></div><div class="stat-info"><h3>Sent</h3><div class="stat-value">${sent}</div></div></div>
                <div class="stat-card" onclick="filterByStatus('draft')"><div class="stat-icon yellow"><i class="fas fa-pen"></i></div><div class="stat-info"><h3>Drafts</h3><div class="stat-value">${drafts}</div></div></div>
                <div class="stat-card" onclick="filterByStatus('pending')"><div class="stat-icon red"><i class="fas fa-clock"></i></div><div class="stat-info"><h3>Pending</h3><div class="stat-value">${pending}</div></div></div>
                <div class="stat-card" onclick="renderLetters()"><div class="stat-icon green"><i class="fas fa-file-alt"></i></div><div class="stat-info"><h3>Total</h3><div class="stat-value">${total}</div></div></div>
            `;
        }

        function filterByStatus(status) {
            const rows = document.querySelectorAll('#lettersTableBody tr');
            rows.forEach(row => {
                const statusSpan = row.querySelector('.status-badge');
                if (statusSpan && statusSpan.innerText === status) row.style.display = '';
                else row.style.display = 'none';
            });
            showToast(`Showing ${status} letters`, 'info');
        }

        function openCreateLetter() {
            document.getElementById('editId').value = '';
            document.getElementById('letterType').value = '';
            document.getElementById('employeeName').value = '';
            document.getElementById('letterSubject').value = '';
            document.getElementById('letterContent').value = '';
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('letterDate').value = today;
            document.getElementById('refNumber').value = generateRef();
            showModal('letterFormModal');
        }

        function saveLetter(isSend = false) {
            const editId = document.getElementById('editId').value;
            const type = document.getElementById('letterType').value;
            const employee = document.getElementById('employeeName').value.trim();
            const subject = document.getElementById('letterSubject').value.trim();
            const content = document.getElementById('letterContent').value.trim();
            const date = document.getElementById('letterDate').value;
            let ref = document.getElementById('refNumber').value;
            
            if (!type || !employee || !subject || !content) {
                showToast('Please fill all required fields', 'warning');
                return;
            }
            
            const status = isSend ? 'sent' : 'draft';
            
            if (editId) {
                // Update existing
                const index = letters.findIndex(l => l.id === editId);
                if (index !== -1) {
                    letters[index] = { ...letters[index], type, employee, subject, content, date, ref, status };
                }
            } else {
                // Create new
                const newId = Date.now().toString();
                letters.push({ id: newId, ref, employee, type, subject, date, status, content });
            }
            saveToStorage();
            renderLetters();
            closeModal('letterFormModal');
            showToast(isSend ? 'Letter sent successfully!' : 'Letter saved as draft', 'success');
        }

        function saveAsDraftLetter() {
            saveLetter(false);
        }

        function editLetter(id) {
            const letter = letters.find(l => l.id === id);
            if (letter) {
                document.getElementById('editId').value = letter.id;
                document.getElementById('letterType').value = letter.type;
                document.getElementById('employeeName').value = letter.employee;
                document.getElementById('letterSubject').value = letter.subject;
                document.getElementById('letterContent').value = letter.content;
                document.getElementById('letterDate').value = letter.date;
                document.getElementById('refNumber').value = letter.ref;
                showModal('letterFormModal');
            }
        }

        function viewLetter(id) {
            const letter = letters.find(l => l.id === id);
            if (letter) {
                const previewDiv = document.getElementById('previewContent');
                previewDiv.innerHTML = `<div style="padding:1rem;"><h2 style="color:var(--primary-blue);">${letter.subject}</h2><hr><p><strong>To:</strong> ${letter.employee}</p><p><strong>Ref:</strong> ${letter.ref}</p><p><strong>Date:</strong> ${letter.date}</p><div style="margin-top:1rem; white-space:pre-line;">${letter.content}</div><p style="margin-top:1rem;"><em>Status: ${letter.status}</em></p></div>`;
                // set confirm send handler for preview modal (if you want to send from preview)
                const confirmBtn = document.getElementById('confirmSendBtn');
                const newBtn = confirmBtn.cloneNode(true);
                confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
                newBtn.id = 'confirmSendBtn';
                newBtn.innerText = 'Close';
                newBtn.onclick = () => closeModal('previewModal');
                showModal('previewModal');
            }
        }

        function deleteLetter(id) {
            if (confirm('Delete this letter permanently?')) {
                letters = letters.filter(l => l.id !== id);
                saveToStorage();
                renderLetters();
                showToast('Letter deleted', 'success');
            }
        }

        function insertVar(variable) {
            const textarea = document.getElementById('letterContent');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            textarea.value = textarea.value.substring(0, start) + variable + textarea.value.substring(end);
            textarea.focus();
        }

        // Quick templates
        function renderQuickTemplates() {
            const container = document.getElementById('quickTemplates');
            if (!container) return;
            const templates = [
                { name: 'Appointment', type: 'Appointment', content: 'Dear {employee_name},\n\nWe are delighted to offer you the position of {position} with our organization, effective {date}. We are confident your skills will be a great asset.' },
                { name: 'Promotion', type: 'Promotion', content: 'Dear {employee_name},\n\nCongratulations on your promotion to {position} effective {date}. Your dedication is highly valued.' },
                { name: 'Warning', type: 'Warning', content: 'Dear {employee_name},\n\nThis letter serves as an official warning regarding performance/conduct concerns. Immediate improvement is required.' }
            ];
            container.innerHTML = templates.map(t => `<div class="category-item" onclick="useQuickTemplate('${t.type}', \`${t.content.replace(/`/g, '\\`')}\`)"><i class="fas fa-file-alt" style="font-size:2rem; color:var(--primary-blue);"></i><h4>${t.name} Template</h4><p>Pre-filled content</p></div>`).join('');
        }

        function useQuickTemplate(typeName, contentTemplate) {
            openCreateLetter();
            document.getElementById('letterType').value = typeName;
            document.getElementById('letterSubject').value = `${typeName} Letter`;
            document.getElementById('letterContent').value = contentTemplate;
            showToast(`${typeName} template loaded`, 'success');
        }

        // Modal helpers
        function showModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }
        function logout() { showToast('Logged out (demo)', 'info'); setTimeout(() => { if(confirm('Demo: Reset to default data?')) resetToDemo(); }, 100); }
        function resetToDemo() {
            letters = [
                { id: '1', ref: 'HR/LTR/2024/001', employee: 'John Doe', type: 'Promotion', subject: 'Promotion to Senior Manager', date: '2024-12-01', status: 'sent', content: 'Congratulations John! You are promoted to Senior Manager effective immediately.' },
                { id: '2', ref: 'HR/LTR/2024/002', employee: 'Jane Smith', type: 'Appointment', subject: 'Appointment as Project Lead', date: '2024-12-03', status: 'draft', content: 'Dear Jane, We are pleased to appoint you as Project Lead...' }
            ];
            saveToStorage();
            renderLetters();
            showToast('Demo data restored', 'success');
        }
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Global filtering by search + stats integration
        window.filterByStatus = filterByStatus;
        window.openCreateLetter = openCreateLetter;
        window.saveLetter = saveLetter;
        window.saveAsDraftLetter = saveAsDraftLetter;
        window.editLetter = editLetter;
        window.viewLetter = viewLetter;
        window.deleteLetter = deleteLetter;
        window.insertVar = insertVar;
        window.useQuickTemplate = useQuickTemplate;
        window.showModal = showModal;
        window.closeModal = closeModal;
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;
        window.logout = logout;
        window.renderLetters = renderLetters;
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            renderLetters();
            renderQuickTemplates();
            // set default date for new letter
            const today = new Date().toISOString().split('T')[0];
            if(document.getElementById('letterDate')) document.getElementById('letterDate').value = today;
            
            // Add confirm send button logic for preview modal global dynamic use
            const confirmBtn = document.getElementById('confirmSendBtn');
            if(confirmBtn) confirmBtn.onclick = () => closeModal('previewModal');
            
            // attach escape key
            document.addEventListener('keydown', (e) => {
                if(e.key === 'Escape') {
                    const modals = document.querySelectorAll('.modal.active');
                    modals.forEach(m => m.classList.remove('active'));
                    document.body.style.overflow = 'auto';
                    closeSidebar();
                }
            });
            // Click outside modal close
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function(e) { if(e.target === modal) closeModal(modal.id); });
            });
        });
    </script>
</body>
</html>
